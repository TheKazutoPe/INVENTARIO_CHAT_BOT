<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | SysMateriales</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4 overflow-hidden relative">
    
    <!-- Elementos Decorativos Fijos Fondo -->
    <div class="absolute -top-32 -left-32 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30 animate-pulse"></div>
    <div class="absolute -bottom-32 -right-32 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-30 animate-pulse animation-delay-2000"></div>

    <div class="glass-card rounded-3xl p-8 md:p-12 w-full max-w-md fade-in relative z-10">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mx-auto mb-6 text-white text-3xl">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h1 class="text-3xl font-black brand-font tracking-tight mb-2">Punto de Control</h1>
            <p class="text-slate-400 text-sm font-medium">Inventario, Stock Físico y Análisis Logístico</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-500 text-sm font-bold px-4 py-3 rounded-xl mb-6 flex items-center gap-3">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <div>{{ error }}</div>
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label class="block text-[11px] font-black tracking-widest text-slate-400 uppercase mb-2">Correo Corporativo</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <input type="email" name="email" required placeholder="admin@correo.com" class="pl-11 pr-4 py-3.5 w-full bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition shadow-inner">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-black tracking-widest text-slate-400 uppercase mb-2">Clave de Operador</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••" class="pl-11 pr-4 py-3.5 w-full bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition shadow-inner">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold tracking-widest uppercase py-4 rounded-xl shadow-[0_4px_20px_rgba(79,70,229,0.3)] transition transform hover:-translate-y-0.5 mt-4">
                Validar Acceso <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
        </form>
        
        <div class="text-center mt-8 space-y-2">
            <div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">📡 SISTEMA RESTRINGIDO A CONTRATAS Y SUPERVISORES</div>
        </div>
    </div>
</body>
</html>
